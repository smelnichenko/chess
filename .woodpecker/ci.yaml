# CI: Run tests on push to non-main branches

when:
  - event: push
    branch:
      exclude: main
  - event: pull_request

steps:
  - name: test
    image: eclipse-temurin:25-jdk
    depends_on: []
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/monitor_chess
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_DATA_REDIS_HOST: redis
    commands:
      - ./gradlew check --no-daemon
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 500m, memory: 2Gi }
          limits: { cpu: 4000m, memory: 4Gi }
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  - name: dependency-check
    image: eclipse-temurin:25-jdk
    environment:
      NVD_DATA_DIR: /opt/nvd-cache
    commands:
      - ./gradlew dependencyCheckAnalyze --no-daemon
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 250m, memory: 1Gi }
          limits: { cpu: 2000m, memory: 2Gi }
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL
        volumes:
          - name: nvd-cache
            persistentVolumeClaim:
              claimName: woodpecker-nvd-cache
        volumeMounts:
          - name: nvd-cache
            mountPath: /opt/nvd-cache

  - name: sonar
    image: eclipse-temurin:25-jdk
    depends_on: [test]
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - |
        for i in $(seq 1 30); do
          wget -q --spider --timeout=2 "$SONAR_HOST_URL/api/system/status" 2>/dev/null && break
          sleep 1
        done
      - ./gradlew sonar --no-daemon
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

services:
  - name: postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: monitor_chess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
  - name: redis
    image: redis:7-alpine
