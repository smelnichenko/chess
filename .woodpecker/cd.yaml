# CD: Test + Build + Deploy on push to main
# Builds chess service image and deploys via shared Helm release in monitor repo

when:
  - branch: main
    event: push

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 10

steps:
  # ============== TEST ==============
  - name: test
    image: eclipse-temurin:25-jdk
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/monitor_chess
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_DATA_REDIS_HOST: redis
    commands:
      - ./gradlew test --no-daemon
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 500m, memory: 2Gi }
          limits: { cpu: 4000m, memory: 4Gi }
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  - name: sonar
    image: eclipse-temurin:25-jdk
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - |
        for i in $(seq 1 30); do
          wget -q --spider --timeout=2 "$SONAR_HOST_URL/api/system/status" 2>/dev/null && break
          sleep 1
        done
      - ./gradlew sonar --no-daemon -Dsonar.qualitygate.wait=false
    depends_on: [test]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  # ============== BUILD IMAGE (Kaniko) ==============
  - name: build-jar
    image: eclipse-temurin:25-jdk
    commands:
      - ./gradlew bootJar --no-daemon -x test
      - mkdir -p .docker-context
      - jar=$(ls build/libs/*.jar | grep -v plain | head -1)
      - cp "$jar" .docker-context/app.jar
      - cp Dockerfile .docker-context/Dockerfile
    depends_on: [test, sonar]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  - name: push-image
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - |
        for i in $(seq 1 60); do
          wget --no-check-certificate -q -O /dev/null -S --timeout=2 https://git.pmon.dev/v2/ 2>&1 | grep -q "HTTP/" && break
          sleep 1
        done
      - mkdir -p /kaniko/.docker
      - |
        echo "{\"auths\":{\"git.pmon.dev\":{\"username\":\"$REGISTRY_USER\",\"password\":\"$REGISTRY_TOKEN\"}}}" > /kaniko/.docker/config.json
      - GIT_HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      - |
        /kaniko/executor \
          --context=.docker-context \
          --destination=git.pmon.dev/schnappy/chess:$GIT_HASH \
          --skip-tls-verify-registry=git.pmon.dev \
          --build-arg=http_proxy=http://monitor-apt-cache.monitor.svc.cluster.local:3142 \
          --cache=true \
          --cache-repo=git.pmon.dev/schnappy/chess/cache
    depends_on: [build-jar]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: registry_user
            target:
              env: REGISTRY_USER
          - name: woodpecker-ci-secrets
            key: registry_token
            target:
              env: REGISTRY_TOKEN

  # ============== DEPLOY ==============
  - name: deploy
    image: alpine/helm:latest
    commands:
      - GIT_HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      - apk add --no-cache curl jq kubectl git
      - |
        KUBE_OK=false
        for i in $(seq 1 30); do
          if curl -sf --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            "https://kubernetes.default.svc/api" >/dev/null 2>&1; then
            KUBE_OK=true
            break
          fi
          echo "Waiting for Kubernetes API connectivity... ($i/30)"
          sleep 1
        done
        [ "$KUBE_OK" = "true" ] || { echo "ERROR: Kubernetes API unreachable after 30s"; exit 1; }
      - |
        git clone --depth 1 https://git.pmon.dev/schnappy/monitor.git /tmp/monitor
      - |
        helm upgrade --install monitor /tmp/monitor/infra/helm \
          --namespace monitor \
          -f /tmp/monitor/infra/helm/values-production.yaml \
          --set-string "chessService.image.tag=$GIT_HASH" \
          --timeout 600s

        echo "Waiting for chess rollout..."
        kubectl rollout status deploy/monitor-chess -n monitor --timeout=120s
    depends_on: [push-image]
    backend_options:
      kubernetes:
        serviceAccountName: woodpecker-deployer

services:
  - name: postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: monitor_chess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
  - name: redis
    image: redis:7-alpine
