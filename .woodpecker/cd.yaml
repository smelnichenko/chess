# CD: Test + Build + Push on push to main
# Builds chess service image and pushes to Forgejo registry
# Deployment is handled by the monitor repo's CD pipeline

when:
  - branch: main
    event: push

clone:
  - name: git
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 100

steps:
  # ============== TEST ==============
  - name: test
    image: eclipse-temurin:25-jdk
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/monitor_chess
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: test
      SPRING_DATA_REDIS_HOST: redis
    commands:
      - ./gradlew clean check --no-daemon
    backend_options:
      kubernetes:
        resources:
          requests: { cpu: 500m, memory: 2Gi }
          limits: { cpu: 4000m, memory: 4Gi }
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  - name: sonar
    image: eclipse-temurin:25-jdk
    commands:
      - '[ -n "$SONAR_TOKEN" ] && [ -n "$SONAR_HOST_URL" ] || { echo "Skipping SonarQube (no token or URL)"; exit 0; }'
      - ./gradlew sonar --no-daemon -Dsonar.qualitygate.wait=false
    depends_on: [test]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: sonar_token
            target:
              env: SONAR_TOKEN
          - name: woodpecker-ci-secrets
            key: sonar_host_url
            target:
              env: SONAR_HOST_URL
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  # ============== BUILD IMAGE (Kaniko) ==============
  - name: build-jar
    image: eclipse-temurin:25-jdk
    commands:
      - ./gradlew clean bootJar --no-daemon -x test
      - mkdir -p .docker-context
      - jar=$(ls build/libs/*.jar | grep -v plain | head -1)
      - cp "$jar" .docker-context/app.jar
      - cp Dockerfile .docker-context/Dockerfile
    depends_on: [test, sonar]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: nexus_url
            target:
              env: NEXUS_URL

  - name: push-image
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - mkdir -p /kaniko/.docker
      - |
        echo "{\"auths\":{\"git.pmon.dev\":{\"username\":\"$REGISTRY_USER\",\"password\":\"$REGISTRY_TOKEN\"}}}" > /kaniko/.docker/config.json
      - GIT_HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      - |
        /kaniko/executor \
          --context=.docker-context \
          --destination=git.pmon.dev/schnappy/chess:$GIT_HASH \
          --skip-tls-verify-registry=git.pmon.dev \
          --registry-mirror=nexus.pmon.dev:8082 \
          --insecure-registry=nexus.pmon.dev:8082 \
          --build-arg=http_proxy=http://schnappy-apt-cache.schnappy.svc.cluster.local:3142 \
          --cache=true \
          --cache-repo=git.pmon.dev/schnappy/chess/cache
    depends_on: [build-jar]
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: registry_user
            target:
              env: REGISTRY_USER
          - name: woodpecker-ci-secrets
            key: registry_token
            target:
              env: REGISTRY_TOKEN

  # ============== UPDATE INFRA REPO (Flux deploys) ==============
  - name: update-infra
    image: alpine:latest
    commands:
      - apk add --no-cache git
      - printf "machine git.pmon.dev\nlogin woodpecker\npassword %s\n" "$INFRA_TOKEN" > ~/.netrc && chmod 600 ~/.netrc
      - GIT_HASH=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      - |
        HELMRELEASE=clusters/production/schnappy-test-apps/values.yaml

        for attempt in 1 2 3 4 5; do
          cd / && rm -rf /tmp/infra
          git clone https://git.pmon.dev/schnappy/infra.git /tmp/infra
          cd /tmp/infra
          git config user.name "Woodpecker CD"
          git config user.email "woodpecker@pmon.dev"

          sed -i "s|tag: \".*\"  # chess-service|tag: \"$GIT_HASH\"  # chess-service|" "$HELMRELEASE"

          git add -A
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "deploy(test): chess=$GIT_HASH"
          git push && { echo "Push succeeded"; exit 0; }

          echo "Push conflict (attempt $attempt), retrying..."
          sleep $((attempt * 2))
        done
        echo "ERROR: Failed to push after 5 attempts"
        exit 1
    backend_options:
      kubernetes:
        secrets:
          - name: woodpecker-ci-secrets
            key: infra_repo_token
            target:
              env: INFRA_TOKEN
    depends_on: [push-image]

services:
  - name: postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: monitor_chess
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
  - name: redis
    image: redis:7-alpine
