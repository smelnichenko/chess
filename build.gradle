plugins {
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'org.sonarqube' version '7.2.3.7755'
    id 'com.github.spotbugs' version '6.4.8'
    id 'org.owasp.dependencycheck' version '12.2.0'
    id 'info.solidsoft.pitest' version '1.19.0-rc.3'
    id 'jacoco'
    id 'java'
}

group = 'io.schnappy'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    def nexusUrl = System.getenv('NEXUS_URL')
    if (nexusUrl) {
        maven {
            url "${nexusUrl}/repository/maven-public/"
            allowInsecureProtocol = true
        }
    }
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-kafka'
    implementation 'org.springframework.boot:spring-boot-starter-liquibase'
    implementation 'com.github.bhlangonijr:chesslib:1.3.3'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.6'
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'com.fasterxml.jackson.core:jackson-databind'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'com.tngtech.archunit:archunit-junit5:1.4.1'
}

test {
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    reports {
        xml.required = true
    }
}

spotbugs {
    toolVersion = '4.9.8'
    excludeFilter = file('spotbugs-exclude.xml')
}

spotbugsMain {
    reports {
        xml.required = true
        html.required = true
    }
}

spotbugsTest.enabled = false

check.dependsOn spotbugsMain

dependencyCheck {
    data {
        directory = System.getenv('NVD_DATA_DIR') ?: "${System.getProperty('user.home')}/.gradle/dependency-check-data"
    }
    formats = ['HTML', 'XML']
    failBuildOnCVSS = 9
    analyzers {
        assemblyEnabled = false
        nodeEnabled = false
        retirejs { enabled = false }
    }
    nvd {
        apiKey = System.getenv('NVD_API_KEY') ?: ''
    }
}

pitest {
    junit5PluginVersion = '1.2.1'
    targetClasses = ['io.schnappy.chess.**']
    excludedClasses = ['**Config', '**Dto', '**Properties', '**Application']
    threads = 4
    outputFormats = ['XML', 'HTML']
    timestampedReports = false
    mutators = ['DEFAULTS']
    timeoutConstInMillis = 10000
    verbose = false
    features = ['-FSPRING']
}

sonar {
    properties {
        property 'sonar.projectKey', 'monitor-chess'
        property 'sonar.projectName', 'Monitor Chess Service'
        property 'sonar.host.url', System.getenv('SONAR_HOST_URL') ?: 'https://sonar.pmon.dev'
        property 'sonar.token', System.getenv('SONAR_TOKEN') ?: ''
        property 'sonar.java.source', '25'
        property 'sonar.coverage.jacoco.xmlReportPaths', "${buildDir}/reports/jacoco/test/jacocoTestReport.xml"
        property 'sonar.coverage.exclusions', '**/config/**,**/dto/**,**/entity/**'
        property 'sonar.java.spotbugs.reportPaths', "${layout.buildDirectory.get()}/reports/spotbugs/main.xml"
        property 'sonar.dependencyCheck.htmlReportPath', "${layout.buildDirectory.get()}/reports/dependency-check-report.html"
        property 'sonar.dependencyCheck.xmlReportPath', "${layout.buildDirectory.get()}/reports/dependency-check-report.xml"
        property 'sonar.qualitygate.wait', 'true'
        property 'sonar.qualitygate.timeout', '300'
    }
}

bootJar {
    enabled = true
}
